controllerManager:
  manager:
    args:
      - --health-probe-bind-address=:8081
      - --metrics-bind-address=:8080
      - --leader-elect
      - --metrics-secure=false
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    image:
      repository: renku/amalthea-sessions
      tag: latest
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi
    # Sentry configuration
    sentry:
      enabled: false
      dsn:
      environment:
      tracesSampleRate: 0.1
  replicas: 1
  metricsService:
    enabled: true
    type: ClusterIP
    port: 8080
    targetPort: 8080
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: /metrics
      prometheus.io/port: "8080"
      prometheus.io/scheme: http
  serviceAccount:
    annotations: {}
  remoteServiceAccount:
    annotations: {}
kubernetesClusterDomain: cluster.local
# If set to true then the operator will watch and operate in all namespaces
clusterScoped: false
# Whether to install the CRD
deployCrd: true
# Whether to install the dependencies or not
deploy:
  priorityClass: false
  # Whether to create a default resource quota priority class named `renku-user-sessions-priority`
  remoteServiceAccount: false
  # Whether to create a service account for a remote Renku portal to connect to the cluster running this operator.
  csiRclone: false

# rcloneStorageClass is the storage class name for the csi-rclone Helm chart
# from https://github.com/SwissDataScienceCenter/csi-rclone.
# It is required to mount Rclone data sources in amalthea sessions.
# NOTE:
#  1. Changing the storage class name will result in the restart of all active
#     amalthea sessions.
#  2. This names has to match the following pattern:
#      "{{ csiRclone.storageClassName }}-secret-annotation"
#     For more details, refer to the README of csi-rclone.
rcloneStorageClass: csi-rclone-secret-annotation
sidecars:
  image:
    repository: renku/sidecars
    tag: latest

cloner:
  image:
    repository: renku/cloner
    tag: latest

# Setting this flag to true will make the oauth2-proxy session cookie set its
# SameSite parameter to None. This is only useful in specific cases for remote Renku cluster.
# Setting this value to true can have security implications without adjusting CSP and CORS on the session ingress.
useNoneSameSiteSessionCookie: false
