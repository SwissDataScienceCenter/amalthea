---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "amalthea-sessions.fullname" . }}-controller-manager
  labels:
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: amalthea
    app.kubernetes.io/part-of: amalthea
  {{- include "amalthea-sessions.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.controllerManager.serviceAccount.annotations | nindent 4 }}

{{- if .Values.deploy.remoteServiceAccount }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: renku-remote-session-manager
  labels:
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: amalthea
    app.kubernetes.io/part-of: amalthea
  {{- include "amalthea-sessions.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.controllerManager.remoteServiceAccount.annotations | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: renku-remote-session-manager-role
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "amalthea-sessions.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - secrets
      - priorityclasses
      - resourcequotas
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods
      - secrets
    verbs:
      - delete
  - apiGroups:
      - apps
    resources:
      - statefulsets
    verbs:
      - get
      - list
      - watch
      - patch
  - apiGroups:
      - ""
    resources:
      - secrets
      - resourcequotas
    verbs:
      - create
      - update
      - delete
      - patch
  - apiGroups:
      - scheduling.k8s.io
    resources:
      - priorityclasses
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - amalthea.dev
    resources:
      - amaltheasessions
    verbs:
      - create
      - update
      - delete
      - patch
      - list
      - get
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: renku-remote-session-manager-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: amalthea
    app.kubernetes.io/part-of: amalthea
  {{- include "amalthea-sessions.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: 'renku-remote-session-manager-role'
subjects:
- kind: ServiceAccount
  name: 'renku-remote-session-manager'
  namespace: '{{ .Release.Namespace }}'

{{- end }}
